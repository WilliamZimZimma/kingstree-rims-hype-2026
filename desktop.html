<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RIMS 2026 — See you in Philadelphia, Jay</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: #041f3f;
    color: #f2efe8;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }

  body {
    background:
      radial-gradient(ellipse at top, rgba(11, 41, 75, 0.9) 0%, #041f3f 60%, #000 100%);
    background-attachment: fixed;
    min-height: 100vh;
  }

  .wrap {
    max-width: 880px;
    margin: 0 auto;
    padding: 32px 24px 56px;
  }

  .greeting-wrap {
    text-align: center;
    margin-bottom: 24px;
  }
  .greeting {
    font-family: "Cormorant Garamond", "Playfair Display", Georgia, serif;
    font-style: italic;
    font-size: 88px;
    font-weight: 500;
    color: #f2efe8;
    letter-spacing: 0.01em;
    line-height: 1;
    margin: 0 0 14px;
    text-shadow: 0 6px 28px rgba(0,0,0,0.5);
  }
  .greeting-sub {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-style: italic;
    font-size: 42px;
    font-weight: 400;
    color: #d6e4f3;
    letter-spacing: 0.02em;
    margin: 0 0 14px;
  }
  .play-hint {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-style: italic;
    font-size: 24px;
    color: rgba(255, 255, 255, 0.55);
    margin: 0;
    letter-spacing: 0.02em;
  }

  .video-wrap {
    position: relative;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(139, 174, 200, 0.15);
    margin: 24px 0 40px;
    background: #000;
    cursor: pointer;
  }
  .video-wrap video {
    width: 100%;
    height: auto;
    display: block;
  }
  .play-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.18);
    transition: background 0.25s ease, opacity 0.25s ease;
    cursor: pointer;
    border: 0;
    padding: 0;
  }
  .play-overlay:hover { background: rgba(0, 0, 0, 0.32); }
  .play-overlay.hidden { opacity: 0; pointer-events: none; }
  .play-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: rgba(6, 51, 103, 0.78);
    border: 2px solid rgba(255, 255, 255, 0.65);
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.55);
    transition: transform 0.2s ease;
  }
  .play-overlay:hover .play-circle { transform: scale(1.06); }
  .play-circle svg {
    width: 44px;
    height: 44px;
    margin-left: 6px;
  }

  /* Pitch */
  .pitch {
    text-align: center;
    margin: 48px 0 8px;
    padding: 36px 24px;
    border-top: 1px solid rgba(139, 174, 200, 0.2);
    border-bottom: 1px solid rgba(139, 174, 200, 0.2);
  }
  .pitch-quote {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-style: italic;
    font-size: 42px;
    font-weight: 400;
    color: #f2efe8;
    line-height: 1.4;
    max-width: 720px;
    margin: 0 auto;
    letter-spacing: 0.01em;
  }
  .pitch-attribution {
    margin-top: 20px;
    font-family: "Cormorant Garamond", Georgia, serif;
    font-style: italic;
    font-size: 24px;
    color: #d6e4f3;
    letter-spacing: 0.02em;
    opacity: 0.9;
  }

  .closing {
    text-align: center;
    margin-top: 48px;
  }
  .closing-line {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-style: italic;
    font-size: 44px;
    font-weight: 400;
    color: #f2efe8;
    margin: 0 0 18px;
    letter-spacing: 0.02em;
  }
  .closing-meta {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 20px;
    color: #8BAEC8;
    letter-spacing: 0.45em;
    font-weight: 500;
    text-transform: uppercase;
    padding-left: 0.45em;
  }

  .bottom-mark {
    margin-top: 64px;
    text-align: center;
  }
  .bottom-mark img {
    width: 320px;
    height: auto;
    filter: drop-shadow(0 4px 20px rgba(0,0,0,0.5));
    opacity: 0.9;
  }

  @media (max-width: 600px) {
    .greeting { font-size: 56px; }
    .greeting-sub { font-size: 32px; }
    .play-hint { font-size: 20px; }
    .play-circle { width: 88px; height: 88px; }
    .play-circle svg { width: 32px; height: 32px; }
    .pitch-quote { font-size: 32px; }
    .pitch-attribution { font-size: 20px; }
    .pitch { padding: 28px 12px; margin: 32px 0; }
    .closing-line { font-size: 32px; }
    .closing-meta { font-size: 17px; letter-spacing: 0.35em; }
    .bottom-mark img { width: 240px; }
    .wrap { padding: 24px 16px 40px; }
  }
</style>
</head>
<body>

<div class="wrap">

  <div class="greeting-wrap">
    <h1 class="greeting">Hey Jay,</h1>
    <p class="greeting-sub">we're looking forward to seeing you during RIMS in Philadelphia.</p>
    <p class="play-hint">(hit play to watch your video)</p>
  </div>

  <div class="video-wrap" id="videoBox">
    <video id="hype" preload="auto" playsinline>
      <source src="hype-Jay.mp4" type="video/mp4">
      Your browser does not support video.
    </video>
    <button class="play-overlay" id="playBtn" aria-label="Play video" type="button">
      <span class="play-circle">
        <svg viewBox="0 0 24 24" fill="#FFFFFF" xmlns="http://www.w3.org/2000/svg">
          <polygon points="6,4 20,12 6,20" />
        </svg>
      </span>
    </button>
  </div>

  <div class="pitch">
    <p class="pitch-quote">If we put this much care into our marketing, imagine what we put into our nurse case management.</p>
    <p class="pitch-attribution">— The Kingstree Group</p>
  </div>

  <div class="closing">
    <p class="closing-line">See you Tuesday.</p>
    <p class="closing-meta">May 5 &nbsp;·&nbsp; 5:30 PM &nbsp;·&nbsp; The Union League</p>
  </div>

  <div class="bottom-mark">
    <img src="kingstree-logo.jpg" alt="Kingstree Group">
  </div>

</div>

<script>
  (function() {
    var video = document.getElementById('hype');
    var btn = document.getElementById('playBtn');
    var box = document.getElementById('videoBox');

    function start() {
      video.controls = true;
      var p = video.play();
      if (p && p.then) p.then(function(){}).catch(function(){});
      btn.classList.add('hidden');
    }

    btn.addEventListener('click', start);
    box.addEventListener('click', function(e) {
      if (e.target === btn || btn.contains(e.target)) return;
      if (video.paused && !btn.classList.contains('hidden')) start();
    });
  })();
</script>

</body>
</html>
