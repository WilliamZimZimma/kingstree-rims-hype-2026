<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RIMS 2026 — Judd</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: #041f3f;
    color: #f2efe8;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  body {
    background: radial-gradient(ellipse at top, rgba(11, 41, 75, 0.9) 0%, #041f3f 60%, #000 100%);
    background-attachment: fixed;
    min-height: 100vh;
  }
  .wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 28px 20px 56px;
  }
  .greeting-wrap { text-align: center; margin-bottom: 40px; }
  .greeting {
    font-family: "Cormorant Garamond", "Playfair Display", Georgia, serif;
    font-style: italic;
    font-size: clamp(52px, 12vw, 80px);
    font-weight: 500;
    color: #f2efe8;
    letter-spacing: 0.01em;
    line-height: 1;
    margin: 0 0 18px;
    text-shadow: 0 6px 28px rgba(0,0,0,0.5);
  }
  .greeting-sub {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-style: italic;
    font-size: clamp(26px, 5.5vw, 44px);
    font-weight: 400;
    color: #d6e4f3;
    letter-spacing: 0.015em;
    line-height: 1.3;
    margin: 0;
  }
  .divider {
    border: none;
    border-top: 1px solid rgba(139, 174, 200, 0.2);
    margin: 40px 0;
  }
  .pitch {
    text-align: center;
    padding: 8px 16px 32px;
  }
  .pitch-quote {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-style: italic;
    font-size: clamp(26px, 5.5vw, 44px);
    font-weight: 400;
    color: #f2efe8;
    line-height: 1.35;
    max-width: 640px;
    margin: 0 auto;
    letter-spacing: 0.01em;
  }
  .pitch-attribution {
    margin-top: 22px;
    font-family: "Cormorant Garamond", Georgia, serif;
    font-style: italic;
    font-size: clamp(18px, 4vw, 30px);
    color: #d6e4f3;
    letter-spacing: 0.02em;
    opacity: 0.9;
  }
  .closing { text-align: center; margin-top: 48px; }
  .closing-line {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-style: italic;
    font-size: clamp(36px, 8vw, 56px);
    font-weight: 400;
    color: #f2efe8;
    margin: 0 0 22px;
    letter-spacing: 0.02em;
  }
  .closing-meta {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: clamp(14px, 3vw, 22px);
    color: #8BAEC8;
    letter-spacing: 0.04em;
    font-weight: 600;
    text-transform: uppercase;
    padding-left: 0.04em;
    line-height: 1.4;
    white-space: nowrap;
  }
  .bottom-mark { margin-top: 72px; text-align: center; }
  .bottom-mark img {
    width: clamp(200px, 50vw, 320px);
    max-width: 80%;
    height: auto;
    filter: drop-shadow(0 4px 20px rgba(0,0,0,0.5));
    opacity: 0.92;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="greeting-wrap">
    <h1 class="greeting">Judd,</h1>
    <p class="greeting-sub">we're looking forward to seeing you tonight in Philadelphia.</p>
  </div>
  <hr class="divider">
  <div class="pitch">
    <p class="pitch-quote">A CMO will recognize this for what it is — a company that puts craft behind every touchpoint. Come see what Kingstree brings to the claims floor.</p>
    <p class="pitch-attribution">— The Kingstree Group</p>
  </div>
  <hr class="divider">
  <div class="closing">
    <p class="closing-line">See you tonight.</p>
    <p class="closing-meta">May 5 &nbsp;·&nbsp; 5:30 PM &nbsp;·&nbsp; The Union League</p>
  </div>
  <div class="bottom-mark">
    <img src="../kingstree-logo.jpg" alt="Kingstree Group">
  </div>
</div>
</body>
</html>
